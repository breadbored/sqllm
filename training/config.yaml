model_name: Qwen/Qwen3.5-27B
data_path: data/training_data.jsonl
output_dir: output/qwen35-sqllm

# qlora settings
load_in_4bit: true
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true
bnb_4bit_quant_type: nf4

# lora settings
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# training settings
max_seq_length: 4096
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 3
learning_rate: 2.0e-4
warmup_ratio: 0.05
lr_scheduler_type: cosine
save_steps: 50
logging_steps: 10
bf16: true

# eval split — held out from training, used for loss monitoring
eval_split: 0.1
